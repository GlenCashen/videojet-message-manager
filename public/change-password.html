<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change Password | Videojet Message Manager</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="changePasswordTitle">
      <p class="eyebrow">Account security</p>
      <h1 id="changePasswordTitle">Change password</h1>
      <p class="muted">Choose a new password before continuing.</p>
      <form id="changePasswordForm" class="auth-form">
        <label for="currentPassword">Current password
          <input id="currentPassword" name="currentPassword" type="password" autocomplete="current-password" required autofocus>
        </label>
        <label for="newPassword">New password
          <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" minlength="8" required>
        </label>
        <button id="changePasswordButton" class="primary" type="submit">Save password</button>
      </form>
      <p id="authMessage" class="notice hidden" aria-live="polite"></p>
    </section>
  </main>
  <script type="module" src="/js/auth-pages.js"></script>
</body>

</html>
