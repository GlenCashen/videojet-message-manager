# Dedicated printer-agent mTLS endpoint.
# This listener should only expose /api/printer-agent/ to the agent management network.

server {
    listen 443 ssl;
    server_name vmm-agent.site.internal;

    ssl_certificate     /etc/videojet-message-manager/tls/server.crt;
    ssl_certificate_key /etc/videojet-message-manager/tls/server.key;

    ssl_client_certificate /etc/videojet-message-manager/tls/site-ca.pem;
    ssl_verify_client on;

    ssl_protocols TLSv1.2 TLSv1.3;

    location /api/printer-agent/ {
        proxy_set_header X-Client-Cert-Verified $ssl_client_verify;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:8080;
    }

    location / {
        return 404;
    }
}
